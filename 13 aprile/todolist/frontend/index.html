<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Todo | Dashboard</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="overflow-x-hidden">
    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-brand-600 p-2 rounded-xl">
                <i data-lucide="check-square" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                NextGen Todo
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="toggle-expired" class="flex items-center gap-2 px-4 py-2 rounded-full glass-card hover:bg-white/10 transition-colors text-sm font-medium">
                <i data-lucide="clock" class="w-4 h-4 text-orange-400"></i>
                Mostra Scaduti
            </button>
            <button id="add-task-btn" class="btn-primary flex items-center gap-2 px-6 py-2 rounded-full text-white font-semibold shadow-lg">
                <i data-lucide="plus" class="w-5 h-5"></i>
                Nuovo Task
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm">Task Totali</p>
                    <h3 id="stat-total" class="text-3xl font-bold mt-1">0</h3>
                </div>
                <div class="bg-indigo-500/20 p-4 rounded-2xl">
                    <i data-lucide="layers" class="text-indigo-400 w-8 h-8"></i>
                </div>
            </div>
            <div class="glass-card p-6 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm">In Corso</p>
                    <h3 id="stat-pending" class="text-3xl font-bold mt-1">0</h3>
                </div>
                <div class="bg-blue-500/20 p-4 rounded-2xl">
                    <i data-lucide="activity" class="text-blue-400 w-8 h-8"></i>
                </div>
            </div>
            <div class="glass-card p-6 flex items-center justify-between">
                <div>
                    <p class="text-gray-400 text-sm">Completati</p>
                    <h3 id="stat-done" class="text-3xl font-bold mt-1">0</h3>
                </div>
                <div class="bg-emerald-500/20 p-4 rounded-2xl">
                    <i data-lucide="check-circle" class="text-emerald-400 w-8 h-8"></i>
                </div>
            </div>
        </div>

        <!-- Task List Header -->
        <div class="flex items-center justify-between mb-8">
            <h2 id="list-title" class="text-2xl font-bold">I Tuoi Task</h2>
            <div class="text-sm text-gray-400">
                Ordinati per <span class="text-brand-600 font-semibold">Priorità</span>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="bg-gray-800/50 p-6 rounded-full mb-4">
                <i data-lucide="coffee" class="text-gray-600 w-12 h-12"></i>
            </div>
            <h3 class="text-xl font-semibold">Tutto calmo...</h3>
            <p class="text-gray-400 mt-2">Non ci sono task da visualizzare. Crea il tuo primo obiettivo!</p>
        </div>

        <!-- Grid -->
        <div id="todo-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Task cards will be injected here -->
        </div>
    </main>

    <!-- Modal for New/Edit Task -->
    <div id="task-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center px-4">
        <div class="modal-overlay absolute inset-0"></div>
        <div class="glass-card relative bg-[#16213e] w-full max-w-md p-8 animate-in">
            <div class="flex items-center justify-between mb-6">
                <h3 id="modal-title" class="text-xl font-bold">Nuovo Task</h3>
                <button id="close-modal" class="text-gray-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="todo-form" class="space-y-6">
                <input type="hidden" id="task-id">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Descrizione</label>
                    <input type="text" id="task-desc" required placeholder="Cosa devi fare?" class="w-full px-4 py-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-brand-600 focus:ring-2 focus:ring-brand-600/20 outline-none transition-all">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Priorità</label>
                        <select id="task-priority" class="w-full px-4 py-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-brand-600 outline-none transition-all">
                            <option value="1">1 - Bassa</option>
                            <option value="2">2 - Media</option>
                            <option value="3">3 - Alta</option>
                            <option value="4">4 - Urgente</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Stato</label>
                        <select id="task-status" class="w-full px-4 py-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-brand-600 outline-none transition-all">
                            <option value="TODO">Todo</option>
                            <option value="IN_PROGRESS">In Corso</option>
                            <option value="DONE">Completato</option>
                            <option value="CANCELLED">Annullato</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Data Scadenza</label>
                    <input type="date" id="task-date" required class="w-full px-4 py-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-brand-600 outline-none transition-all">
                </div>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl text-white font-bold shadow-lg mt-4">
                    Salva Task
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
