spring:
  application:
    name: toDoListWithAutentication

  datasource:
    url: jdbc:mysql://localhost:3306/todo_list_auth?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  security:
    user:
      name: admin
      password: 1234
      roles: USER

jwt:
  secret: mysupersecretkey1234567890abcdef
  expiration: 86400000 # 1 giorno in millisecondi
  
server:
  port: 8080